name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: '0'

      # --- Tags Manager ---
      - name: Bump version and push tag
        id: tag_version
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: anothrNick/github-tag-action@1.64.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          INITIAL_VERSION: 1.0.0
          DEFAULT_BUMP: patch
          WITH_V: false
          MAJOR_STRING_TOKEN: "#MAJOR"
          MINOR_STRING_TOKEN: "#MINOR"
          PATCH_STRING_TOKEN: "#PATCH"

      # --- (Semantic + SHA) ---
      - name: Prepare Combined Tag
        id: vars
        run: |
          # SHA
          SHA=$(echo ${GITHUB_SHA} | cut -c1-7)
          
          if [ "${{ github.event_name }}" == "pull_request" ]; then
            echo "tag=pr-${{ github.event.number }}-${SHA}" >> $GITHUB_OUTPUT
          else
            VERSION="${{ steps.tag_version.outputs.new_tag }}"
            echo "tag=${VERSION}-${SHA}" >> $GITHUB_OUTPUT
          fi

      # --- Docker Build ---
      - name: Build Docker Image
        run: |
          IMAGE_NAME="url-shortener"
          FINAL_TAG="${{ steps.vars.outputs.tag }}"
          
          echo "Building image with tag: $FINAL_TAG"
          docker build -t $IMAGE_NAME:$FINAL_TAG .

      # --- Security Scan ---
      - name: Scan Image (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'url-shortener:${{ steps.vars.outputs.tag }}'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'