apiVersion: networking.istio.io/v1alpha3
kind: Gateway
metadata:
  name: {{ include "url-shortener.fullname" . }}-gateway
  namespace: {{ .Release.Namespace }}
spec:
  selector:
    istio: ingressgateway 
  servers:
  - port:
      number: 80
      name: http
      protocol: HTTP
    hosts:
    - "*" 
---
apiVersion: networking.istio.io/v1alpha3
kind: VirtualService
metadata:
  name: {{ include "url-shortener.fullname" . }}-routing
  namespace: {{ .Release.Namespace }}
spec:
  hosts:
  - "*"
  gateways:
  - {{ include "url-shortener.fullname" . }}-gateway
  http:
  - route:
    - destination:
        host: {{ include "url-shortener.fullname" . }} 
        port:
          number: {{ .Values.service.port }}